# cloudbuild.yaml — Google Cloud Build CI/CD
# Trigger: Push a main → build + deploy automático

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: jarvis-v2
  _IMAGE_NAME: jarvis-v2

steps:
  # 1. Build
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # 2. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_REGION'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest'
      - '.'

  # 3. Push images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_REGION']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest']

  # 4. Deploy a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_REGION'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:$_REGION'
  - 'gcr.io/$PROJECT_ID/$_IMAGE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
