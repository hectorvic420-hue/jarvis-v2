version: "3.8"

services:
  postgres-evolution:
    image: postgres:16
    container_name: postgres-evolution
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
      POSTGRES_DB: evolution
    volumes:
      - postgres-evolution-data:/var/lib/postgresql/data
    restart: unless-stopped

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8085:8080"
    environment:
      SERVER_URL: http://localhost:8085
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://evolution:evolution123@postgres-evolution:5432/evolution
      AUTHENTICATION_API_KEY: Jarvis_WA_Key_2026
      QRCODE_LIMIT: "30"
      QRCODE_EXPIRATION_TIME: "45"
      CONFIG_SESSION_PHONE_CLIENT: Jarvis
      CONFIG_SESSION_PHONE_NAME: Chrome
    depends_on:
      - postgres-evolution
    restart: unless-stopped

volumes:
  postgres-evolution-data:
