services:
  postgres-evolution:
    image: postgres:16
    container_name: postgres-evolution
    hostname: postgres
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
      POSTGRES_DB: evolution
    volumes:
      - postgres-evolution-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8085:8080"
    environment:
      SERVER_URL: http://localhost:8085
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://evolution:evolution123@postgres:5432/evolution
      AUTHENTICATION_API_KEY: Jarvis_WA_Key_2026
      QRCODE_LIMIT: "30"
      QRCODE_EXPIRATION_TIME: "45"
      CONFIG_SESSION_PHONE_CLIENT: Jarvis
      CONFIG_SESSION_PHONE_NAME: Chrome
    depends_on:
      postgres-evolution:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-evolution-data:
